<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=5"
  />

  <meta
    name="description"
    content="Learn about ARAWLII — Academy of Writers and World Literati, its history, vision, mission, leadership and literary journey."
  />

  <meta name="theme-color" content="#0d3328" />

  <title>About ARAWLII | Academy of Writers and World Literati</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --ivory: #f7f0e4;
      --paper: #fffaf0;
      --paper-dark: #efe3d0;

      --forest: #0d3328;
      --forest-light: #174a39;
      --forest-dark: #071f19;

      --maroon: #68242a;
      --maroon-dark: #4b171c;

      --gold: #bd8b32;
      --gold-light: #dfbd76;

      --text: #251c17;
      --muted: #6e6258;

      --white: #ffffff;
      --border: rgba(189, 139, 50, 0.35);

      --shadow-sm: 0 12px 30px rgba(37, 28, 23, 0.1);
      --shadow-lg: 0 30px 70px rgba(37, 28, 23, 0.18);

      --container: 1180px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: 105px;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--text);
      background: var(--ivory);
      font-family: "Inter", sans-serif;
      line-height: 1.7;
    }

    body.menu-open {
      overflow: hidden;
    }

    img {
      display: block;
      width: 100%;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    ul {
      list-style: none;
    }

    h1,
    h2,
    h3,
    h4 {
      font-family: "Cormorant Garamond", Georgia, serif;
      line-height: 1.08;
    }

    p {
      color: var(--muted);
    }

    .container {
      width: min(var(--container), 92%);
      margin-inline: auto;
    }

    .section {
      padding: 100px 0;
    }

    .section-soft {
      background: var(--paper-dark);
    }

    .section-dark {
      color: var(--white);
      background:
        radial-gradient(
          circle at 85% 15%,
          rgba(189, 139, 50, 0.17),
          transparent 35%
        ),
        var(--forest);
    }

    .section-dark h2,
    .section-dark h3 {
      color: var(--white);
    }

    .section-dark p {
      color: #ddd2c1;
    }

    .skip-link {
      position: fixed;
      top: -70px;
      left: 20px;
      z-index: 9999;
      padding: 12px 18px;
      color: var(--forest-dark);
      background: var(--gold);
      border-radius: 8px;
      font-weight: 700;
      transition: top 0.25s ease;
    }

    .skip-link:focus {
      top: 20px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      color: var(--maroon);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      width: 34px;
      height: 2px;
      content: "";
      background: var(--gold);
    }

    .section-dark .eyebrow {
      color: var(--gold-light);
    }

    .section-heading {
      max-width: 760px;
      margin-bottom: 50px;
    }

    .section-heading.center {
      margin-inline: auto;
      text-align: center;
    }

    .section-heading.center .eyebrow::before {
      display: none;
    }

    .section-heading h2 {
      margin-bottom: 18px;
      color: var(--forest);
      font-size: clamp(2.7rem, 5vw, 4.7rem);
    }

    .section-heading p {
      max-width: 680px;
      font-size: 1.02rem;
    }

    .section-heading.center p {
      margin-inline: auto;
    }

    .announcement-bar {
      position: relative;
      z-index: 1100;
      color: #f0e4cf;
      background: var(--forest-dark);
      font-size: 0.78rem;
    }

    .announcement-inner {
      display: flex;
      min-height: 38px;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .announcement-inner span:last-child {
      color: var(--gold-light);
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 250, 240, 0.94);
      backdrop-filter: blur(18px);
    }

    .navbar {
      display: flex;
      min-height: 86px;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
    }

    .brand {
      display: flex;
      min-width: 250px;
      align-items: center;
      gap: 13px;
    }

    .brand-mark {
      display: grid;
      width: 54px;
      height: 54px;
      flex-shrink: 0;
      place-items: center;
      color: var(--gold);
      border: 2px solid var(--gold);
      border-radius: 50%;
      background: var(--forest);
      font-family: Georgia, serif;
      font-size: 1.7rem;
    }

    .brand-text strong {
      display: block;
      color: var(--maroon);
      font-family: "Cormorant Garamond", serif;
      font-size: 1.5rem;
      letter-spacing: 0.14em;
      line-height: 1;
    }

    .brand-text small {
      display: block;
      margin-top: 6px;
      color: var(--forest);
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1.25;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 22px;
    }

    .nav-links a {
      position: relative;
      color: var(--forest);
      font-size: 0.86rem;
      font-weight: 700;
    }

    .nav-links a:not(.nav-button)::after {
      position: absolute;
      right: 0;
      bottom: -7px;
      left: 0;
      height: 2px;
      content: "";
      background: var(--gold);
      transform: scaleX(0);
      transition: transform 0.25s ease;
    }

    .nav-links a:hover::after,
    .nav-links a.active::after {
      transform: scaleX(1);
    }

    .nav-button {
      padding: 11px 18px;
      border: 1px solid var(--gold);
      border-radius: 999px;
      transition:
        color 0.25s ease,
        background 0.25s ease;
    }

    .nav-button:hover {
      color: var(--white);
      background: var(--forest);
    }

    .menu-toggle {
      display: none;
      width: 46px;
      height: 46px;
      cursor: pointer;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: transparent;
    }

    .menu-toggle span {
      display: block;
      width: 22px;
      height: 2px;
      margin: 5px auto;
      background: var(--forest);
      transition:
        transform 0.3s ease,
        opacity 0.3s ease;
    }

    .menu-toggle.active span:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }

    .menu-toggle.active span:nth-child(2) {
      opacity: 0;
    }

    .menu-toggle.active span:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg);
    }

    .page-hero {
      position: relative;
      display: grid;
      min-height: 68vh;
      overflow: hidden;
      align-items: center;
      color: var(--white);
      isolation: isolate;
    }

    .page-hero-background {
      position: absolute;
      z-index: -3;
      inset: 0;
      background:
        url("images/about-hero.jpg") center / cover no-repeat,
        linear-gradient(135deg, #1b4033, #735134);
      transform: scale(1.03);
    }

    .page-hero-overlay {
      position: absolute;
      z-index: -2;
      inset: 0;
      background:
        linear-gradient(
          90deg,
          rgba(7, 31, 25, 0.97) 0%,
          rgba(7, 31, 25, 0.84) 50%,
          rgba(104, 36, 42, 0.35) 100%
        );
    }

    .page-hero-decoration {
      position: absolute;
      z-index: -1;
      top: 50%;
      right: -90px;
      width: 400px;
      height: 400px;
      border: 1px solid rgba(223, 189, 118, 0.5);
      border-radius: 50%;
      transform: translateY(-50%);
    }

    .page-hero-decoration::before,
    .page-hero-decoration::after {
      position: absolute;
      content: "";
      border: 1px solid rgba(223, 189, 118, 0.45);
      border-radius: 50%;
      inset: 42px;
    }

    .page-hero-decoration::after {
      inset: 90px;
    }

    .page-hero-content {
      max-width: 850px;
      padding: 105px 0 90px;
    }

    .page-hero .eyebrow {
      color: var(--gold-light);
    }

    .page-hero h1 {
      margin-bottom: 24px;
      font-size: clamp(4rem, 8vw, 7rem);
    }

    .page-hero p {
      max-width: 720px;
      color: #ede3d3;
      font-size: clamp(1rem, 2vw, 1.18rem);
    }

    .breadcrumb {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 30px;
      color: #d5c8b5;
      font-size: 0.82rem;
    }

    .breadcrumb a {
      color: var(--gold-light);
    }

    .breadcrumb span {
      opacity: 0.7;
    }

    .about-intro-grid {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      align-items: start;
      gap: 70px;
    }

    .about-intro-title h2 {
      color: var(--forest);
      font-size: clamp(2.8rem, 5vw, 4.7rem);
    }

    .about-intro-content p + p {
      margin-top: 18px;
    }

    .highlight-box {
      margin-top: 32px;
      padding: 28px;
      color: var(--white);
      border-left: 5px solid var(--gold);
      background: var(--forest);
      box-shadow: var(--shadow-sm);
    }

    .highlight-box p {
      color: #eee2d0;
      font-family: "Cormorant Garamond", serif;
      font-size: 1.45rem;
      font-style: italic;
    }

    .registration-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .registration-card {
      min-height: 180px;
      padding: 26px;
      border: 1px solid var(--border);
      background: var(--paper);
      transition:
        transform 0.3s ease,
        box-shadow 0.3s ease;
    }

    .registration-card:hover {
      box-shadow: var(--shadow-sm);
      transform: translateY(-6px);
    }

    .registration-card span {
      display: block;
      margin-bottom: 18px;
      color: var(--gold);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .registration-card h3 {
      color: var(--maroon);
      font-size: 1.45rem;
      overflow-wrap: anywhere;
    }

    .vision-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
    }

    .vision-card {
      position: relative;
      overflow: hidden;
      min-height: 360px;
      padding: 40px;
      border: 1px solid rgba(223, 189, 118, 0.25);
      background: rgba(255, 255, 255, 0.04);
    }

    .vision-card::after {
      position: absolute;
      right: -70px;
      bottom: -70px;
      width: 190px;
      height: 190px;
      content: "";
      border: 1px solid rgba(223, 189, 118, 0.3);
      border-radius: 50%;
    }

    .vision-icon {
      display: grid;
      width: 62px;
      height: 62px;
      margin-bottom: 30px;
      place-items: center;
      color: var(--gold);
      border: 1px solid var(--gold);
      border-radius: 50%;
      font-size: 1.8rem;
    }

    .vision-card h3 {
      margin-bottom: 18px;
      font-size: 2.2rem;
    }

    .vision-card ul {
      display: grid;
      gap: 11px;
      margin-top: 20px;
    }

    .vision-card li {
      position: relative;
      padding-left: 22px;
      color: #ddd2c1;
      font-size: 0.93rem;
    }

    .vision-card li::before {
      position: absolute;
      top: 10px;
      left: 0;
      width: 7px;
      height: 7px;
      content: "";
      border-radius: 50%;
      background: var(--gold);
    }

    .values-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .value-card {
      position: relative;
      min-height: 245px;
      padding: 26px;
      border: 1px solid var(--border);
      background: var(--paper);
      transition:
        transform 0.3s ease,
        box-shadow 0.3s ease;
    }

    .value-card:hover {
      box-shadow: var(--shadow-sm);
      transform: translateY(-6px);
    }

    .value-number {
      display: block;
      margin-bottom: 35px;
      color: var(--gold);
      font-family: "Cormorant Garamond", serif;
      font-size: 2rem;
      font-weight: 700;
    }

    .value-card h3 {
      margin-bottom: 12px;
      color: var(--maroon);
      font-size: 1.6rem;
    }

    .timeline {
      position: relative;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
    }

    .timeline::before {
      position: absolute;
      top: 25px;
      right: 0;
      left: 0;
      height: 2px;
      content: "";
      background: var(--gold);
    }

    .timeline-item {
      position: relative;
      padding-top: 75px;
    }

    .timeline-item::before {
      position: absolute;
      top: 14px;
      left: 0;
      width: 23px;
      height: 23px;
      content: "";
      border: 6px solid var(--paper-dark);
      border-radius: 50%;
      background: var(--maroon);
      box-shadow: 0 0 0 2px var(--gold);
    }

    .timeline-year {
      display: block;
      margin-bottom: 8px;
      color: var(--maroon);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .timeline-item h3 {
      margin-bottom: 10px;
      color: var(--forest);
      font-size: 1.55rem;
    }

    .leadership-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .leader-card {
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--paper);
      box-shadow: var(--shadow-sm);
      transition: transform 0.3s ease;
    }

    .leader-card:hover {
      transform: translateY(-7px);
    }

    .leader-image {
      display: grid;
      min-height: 260px;
      place-items: center;
      background:
        linear-gradient(
          180deg,
          rgba(13, 51, 40, 0.05),
          rgba(13, 51, 40, 0.8)
        ),
        var(--leader-image, linear-gradient(135deg, #bba17b, #3d2a24))
          center / cover;
    }

    .leader-card:nth-child(1) .leader-image {
      --leader-image: url("images/satish-verma.jpg");
    }

    .leader-card:nth-child(2) .leader-image {
      --leader-image: url("images/anuraag-sharma.jpg");
    }

    .leader-card:nth-child(3) .leader-image {
      --leader-image: url("images/moizur-khan.jpg");
    }

    .leader-initials {
      display: grid;
      width: 86px;
      height: 86px;
      place-items: center;
      color: var(--gold);
      border: 2px solid var(--gold);
      border-radius: 50%;
      background: rgba(7, 31, 25, 0.85);
      font-family: "Cormorant Garamond", serif;
      font-size: 1.7rem;
      font-weight: 700;
    }

    .leader-content {
      padding: 26px;
    }

    .leader-role {
      display: block;
      margin-bottom: 7px;
      color: var(--gold);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .leader-content h3 {
      margin-bottom: 12px;
      color: var(--maroon);
      font-size: 1.9rem;
    }

    .achievements-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    .achievement-card {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 20px;
      padding: 28px;
      border: 1px solid rgba(223, 189, 118, 0.24);
      background: rgba(255, 255, 255, 0.04);
    }

    .achievement-icon {
      display: grid;
      width: 56px;
      height: 56px;
      place-items: center;
      color: var(--forest-dark);
      border-radius: 50%;
      background: var(--gold);
      font-weight: 900;
    }

    .achievement-card h3 {
      margin-bottom: 10px;
      font-size: 1.6rem;
    }

    .philosophy-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      align-items: center;
      gap: 70px;
    }

    .philosophy-content h2 {
      margin-bottom: 20px;
      color: var(--forest);
      font-size: clamp(2.8rem, 5vw, 4.8rem);
    }

    .philosophy-content p + p {
      margin-top: 18px;
    }

    .philosophy-visual {
      position: relative;
      min-height: 470px;
      overflow: hidden;
      border: 1px solid var(--border);
      background:
        linear-gradient(
          180deg,
          rgba(13, 51, 40, 0.08),
          rgba(13, 51, 40, 0.76)
        ),
        url("images/literary-philosophy.jpg") center / cover,
        linear-gradient(135deg, #c9b48f, #3a2b25);
      box-shadow: var(--shadow-lg);
    }

    .philosophy-quote {
      position: absolute;
      right: 26px;
      bottom: 26px;
      left: 26px;
      padding: 26px;
      color: var(--white);
      border-left: 4px solid var(--gold);
      background: rgba(7, 31, 25, 0.88);
      backdrop-filter: blur(10px);
    }

    .philosophy-quote p {
      color: #eee2d0;
      font-family: "Cormorant Garamond", serif;
      font-size: 1.4rem;
      font-style: italic;
    }

    .cta-section {
      padding: 85px 0;
      color: var(--white);
      background:
        linear-gradient(
          90deg,
          rgba(7, 31, 25, 0.96),
          rgba(104, 36, 42, 0.85)
        ),
        url("images/cta-background.jpg") center / cover;
    }

    .cta-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 40px;
    }

    .cta-grid h2 {
      margin-bottom: 12px;
      color: var(--white);
      font-size: clamp(2.6rem, 5vw, 4.4rem);
    }

    .cta-grid p {
      max-width: 700px;
      color: #e8ddcb;
    }

    .cta-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .button {
      display: inline-flex;
      min-height: 50px;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 22px;
      border: 1px solid transparent;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 800;
      transition:
        transform 0.25s ease,
        box-shadow 0.25s ease,
        color 0.25s ease,
        background 0.25s ease;
    }

    .button:hover {
      transform: translateY(-3px);
    }

    .button-gold {
      color: var(--forest-dark);
      background: var(--gold);
      box-shadow: 0 14px 30px rgba(189, 139, 50, 0.22);
    }

    .button-gold:hover {
      background: var(--gold-light);
    }

    .button-outline {
      color: var(--white);
      border-color: rgba(255, 255, 255, 0.65);
      background: rgba(255, 255, 255, 0.04);
    }

    .button-outline:hover {
      color: var(--forest);
      background: var(--white);
    }

    .footer {
      padding: 70px 0 25px;
      color: #ddd1bd;
      background: var(--forest-dark);
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 1.3fr 0.7fr 1fr;
      gap: 55px;
    }

    .footer-brand {
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    .footer-brand strong {
      display: block;
      color: var(--gold);
      font-family: "Cormorant Garamond", serif;
      font-size: 2rem;
    }

    .footer-brand p {
      max-width: 360px;
      color: #bfb3a1;
      font-size: 0.88rem;
    }

    .footer h3 {
      margin-bottom: 18px;
      color: var(--gold);
      font-size: 1.2rem;
    }

    .footer-links a {
      display: block;
      width: fit-content;
      margin: 8px 0;
      color: #cfc3b0;
      font-size: 0.88rem;
    }

    .footer-links a:hover {
      color: var(--gold-light);
    }

    .footer-info p {
      margin-bottom: 10px;
      color: #bfb3a1;
      font-size: 0.85rem;
    }

    .footer-bottom {
